name: Soccer ML Predictor

on:

  workflow_dispatch:

  schedule:
    - cron: "0 */12 * * *"

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect matches
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python src/collectors/matches_collector.py

      - name: Create targets
        run: python src/features/create_targets.py

      - name: Feature engineering
        run: python src/features/feature_engineering.py

      - name: Train 1X2
        run: python src/models/train_1x2.py

      - name: Train Over 2.5
        run: python src/models/train_over25.py

      - name: Train BTTS
        run: python src/models/train_btts.py

      - name: Train Corners
        run: python src/models/train_corners.py

      - name: Train Cards
        run: python src/models/train_cards.py

      - name: Generate Predictions
        run: python src/predictors/generate_predictions.py
